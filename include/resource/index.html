<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Backup & Cloud Storage Server</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }
        .main-container {
            display: flex;
            gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
            height: calc(100vh - 40px);
        }
        .left-panel, .right-panel {
            flex: 1;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        .section {
            margin-bottom: 20px;
        }
        .section h2 {
            font-size: 1.25rem;
            color: #333;
            margin-bottom: 15px;
            font-weight: 600;
            border-bottom: 2px solid #4facfe;
            padding-bottom: 8px;
        }
        .card { border: none; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .btn { border-radius: 6px; font-weight: 500; }

        /* === 聊天界面样式 === */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: #f7f9fc;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            line-height: 1.4;
        }
        .message-user {
            align-self: flex-end;
            background: #0096ff;
            color: white;
        }
        .message-bot {
            align-self: flex-start;
            background: white;
            border: 1px solid #e0e0e0;
            color: #333;
        }
        .chat-input {
            display: flex;
            padding: 12px;
            background: white;
            border-top: 1px solid #eee;
        }
        .chat-input input {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 20px;
            padding: 10px 16px;
            outline: none;
        }
        .chat-input button {
            margin-left: 8px;
            border-radius: 20px;
            padding: 0 20px;
        }
    </style>
</head>

<body>
    <div class="main-container">
        <!-- 左侧：原有功能 -->
        <div class="left-panel">
            <div class="header">
                <h1><i class="fas fa-cloud"></i> 日志备份与云存储</h1>
                <p>高性能文件管理服务</p>
            </div>
            <div class="content">
                <!-- 健康检查 -->
                <div class="section">
                    <h2><i class="fas fa-heartbeat"></i> 健康检查</h2>
                    <div class="card">
                        <div class="card-body">
                            <button id="checkHealth" class="btn btn-primary">
                                <i class="fas fa-check-circle"></i> 检查服务状态
                            </button>
                            <div id="healthResponse" class="response mt-2"></div>
                        </div>
                    </div>
                </div>

                <!-- 文件上传 -->
                <div class="section">
                    <h2><i class="fas fa-cloud-upload-alt"></i> 云存储</h2>
                    <div class="card mb-3">
                        <div class="card-header"><i class="fas fa-upload"></i> 文件上传</div>
                        <div class="card-body">
                            <input type="file" id="fileInput" class="form-control mb-2">
                            <button id="uploadFile" class="btn btn-primary"><i class="fas fa-upload"></i> 上传</button>
                            <div id="uploadResponse" class="response mt-2"></div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header"><i class="fas fa-list"></i> 文件列表</div>
                        <div class="card-body">
                            <button id="listFiles" class="btn btn-secondary mb-2"><i class="fas fa-refresh"></i> 刷新</button>
                            <div id="fileList"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧：AI 聊天 -->
        <div class="right-panel">
            <div class="header">
                <h2><i class="fas fa-robot"></i> AI 智能助手</h2>
                <p>支持流式对话 · 逐字输出</p>
            </div>

            <div class="chat-container">
                <div id="chatMessages" class="chat-messages">
                    <div class="message message-bot">你好！我是 AI 助手，有什么可以帮你？</div>
                </div>

                <div class="chat-input">
                    <input id="chatInput" type="text" placeholder="输入消息..." autocomplete="off">
                    <button id="sendChat" class="btn btn-primary"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const BASE_URL = 'http://localhost:8080';

        // ==================== 原有功能代码 ====================
        $('#checkHealth').click(function() {
            let btn = $(this);
            btn.html('<i class="fas fa-spinner fa-spin"></i> 检查中...').prop('disabled', true);
            $.get(BASE_URL + '/health', data => {
                $('#healthResponse').html('<pre>✅ 服务正常：' + data + '</pre>');
            }).fail(() => {
                $('#healthResponse').html('<pre>❌ 服务未启动</pre>');
            }).always(() => {
                btn.html('<i class="fas fa-check-circle"></i> 检查服务状态').prop('disabled', false);
            });
        });

        $('#uploadFile').click(function() {
            let file = $('#fileInput')[0].files[0];
            if (!file) return alert('请选择文件');
            let btn = $(this);
            btn.html('<i class="fas fa-spinner fa-spin"></i> 上传中...').prop('disabled', true);

            let reader = new FileReader();
            reader.onload = e => {
                $.ajax({
                    url: BASE_URL + '/api/storage/upload?filename=' + encodeURIComponent(file.name),
                    type: 'POST',
                    data: new Uint8Array(e.target.result),
                    contentType: 'application/octet-stream',
                    processData: false,
                    success: () => {
                        $('#uploadResponse').html('<pre>✅ 上传成功</pre>');
                        $('#listFiles').click();
                    },
                    error: () => $('#uploadResponse').html('<pre>❌ 上传失败</pre>'),
                    complete: () => btn.html('<i class="fas fa-upload"></i> 上传').prop('disabled', false)
                });
            };
            reader.readAsArrayBuffer(file);
        });

        $('#listFiles').click(function() {
            let btn = $(this);
            btn.html('<i class="fas fa-spinner fa-spin"></i> 加载中...').prop('disabled', true);
            $.get(BASE_URL + '/api/storage/list', data => {
                let list = $('#fileList').empty();
                let files = data.split('\n').filter(l => l.startsWith('- ')).map(l => l.substring(2));
                if (files.length === 0) {
                    list.html('<div class="alert alert-info">暂无文件</div>');
                    return;
                }
                let ul = $('<ul class="list-group"></ul>');
                files.forEach(f => {
                    ul.append(`<li class="list-group-item">
                        ${f}
                        <div class="float-end">
                            <button class="btn btn-sm btn-primary download" data-f="${f}"><i class="fas fa-download"></i></button>
                            <button class="btn btn-sm btn-danger delete" data-f="${f}"><i class="fas fa-trash"></i></button>
                        </div>
                    </li>`);
                });
                list.append(ul);
            }).always(() => btn.html('<i class="fas fa-refresh"></i> 刷新').prop('disabled', false));
        });

        $(document).on('click', '.download', function() {
            window.open(BASE_URL + '/api/storage/download/' + encodeURIComponent($(this).data('f')));
        });

        $(document).on('click', '.delete', function() {
            let f = $(this).data('f');
            if (!confirm('确定删除 ' + f + '？')) return;
            $.ajax({
                url: BASE_URL + '/api/storage/delete/' + encodeURIComponent(f),
                type: 'DELETE',
                success: () => $('#listFiles').click()
            });
        });

        // ==================== 聊天功能（完美修复 POST 流式） ====================
        function addMessage(text, isUser = false) {
            let cls = isUser ? 'message-user' : 'message-bot';
            $('#chatMessages').append(`<div class="message ${cls}">${text}</div>`).scrollTop($('#chatMessages')[0].scrollHeight);
        }

        function sendChat() {
            let msg = $('#chatInput').val().trim();
            if (!msg) return;
            
            $('#chatInput').val('');
            addMessage(msg, true);

            let botMsg = $('<div class="message message-bot"></div>');
            $('#chatMessages').append(botMsg).scrollTop($('#chatMessages')[0].scrollHeight);

            // 核心修复：fetch POST + 流式读取 SSE
            fetch('http://localhost:8080/api/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ message: msg })
            })
            .then(response => {
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                function processStream() {
                    reader.read().then(({ done, value }) => {
                        if (done) return;

                        buffer += decoder.decode(value, { stream: true });
                        const chunks = buffer.split('\n\n');
                        buffer = chunks.pop();

                        chunks.forEach(chunk => {
                            if (chunk.startsWith('data: ')) {
                                const dataStr = chunk.substring(6);
                                if (dataStr === '[DONE]') return;
                                
                                try {
                                    const data = JSON.parse(dataStr);
                                    botMsg.append(data.content);
                                    $('#chatMessages').scrollTop($('#chatMessages')[0].scrollHeight);
                                } catch (e) {}
                            }
                        });
                        processStream();
                    });
                }
                processStream();
            })
            .catch(err => {
                botMsg.append('连接失败，请检查后端服务');
            });
        }

        $('#sendChat').click(sendChat);
        $('#chatInput').keypress(e => e.which === 13 && sendChat());

        // 初始化
        $(document).ready(function() {
            $('#checkHealth').click();
            $('#listFiles').click();
        });
    </script>
</body>
</html>
